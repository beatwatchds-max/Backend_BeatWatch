name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj

    - name: Dependency Vulnerability Audit
      working-directory: ./BeatWatch_BackEnd
      run: |
        dotnet list BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj package --vulnerable --include-transitive

    - name: Build project
      run: dotnet build BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj --no-restore --configuration Release

    - name: Run tests
      run: dotnet test BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj --no-build --no-restore --configuration Release
