name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test-and-scan:
    name: Test & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_MONGODB_CONNECTION_STRING: mongodb://localhost:27017

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj

    - name: Dependency Vulnerability Audit
      run: dotnet list BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj package --vulnerable --include-transitive

    - name: Secret scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build project
      run: dotnet build BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj --no-restore --configuration Release

    - name: Run unit and integration tests with coverage
      run: >-
        dotnet test BeatWatch_BackEnd.Tests/BeatWatch_BackEnd.Tests.csproj
        --no-build --no-restore --configuration Release
        --collect:"XPlat Code Coverage"
        --logger "trx;LogFileName=tests.trx"
        --results-directory TestResults

    - name: Publish test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults
        if-no-files-found: warn

  deployment-smoke-test:
    name: Container Deployment Smoke Test
    needs: test-and-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build and start production container
      run: docker compose -f docker-compose.ci.yml up --build --wait

    - name: Verify health endpoint
      run: curl --fail --retry 5 --retry-connrefused http://localhost:8080/health

    - name: Stop test environment
      if: always()
      run: docker compose -f docker-compose.ci.yml down --volumes --remove-orphans

  publish-image:
    name: Publish Production Image
    needs: deployment-smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract image metadata
      id: metadata
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/beatwatch-backend
        tags: |
          type=raw,value=latest
          type=sha,prefix=sha-

    - name: Build and publish image
      id: push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: BeatWatch_BackEnd/Dockerfile
        push: true
        tags: ${{ steps.metadata.outputs.tags }}
        labels: ${{ steps.metadata.outputs.labels }}
        sbom: true
        provenance: mode=max

    - name: Attest build provenance
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: ghcr.io/${{ github.repository_owner }}/beatwatch-backend
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
