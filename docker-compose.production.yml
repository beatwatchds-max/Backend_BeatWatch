services:
  api:
    image: ${BEATWATCH_IMAGE:?Set BEATWATCH_IMAGE to a published image tag}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "${API_PORT:-8080}:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
